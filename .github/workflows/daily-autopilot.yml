name: Arganor Daily SEO Autopilot

on:
  schedule:
    # Tous les jours à 8h00 du matin
    - cron: '0 8 * * *'
  workflow_dispatch: # Permet de le lancer manuellement depuis l'interface GitHub

permissions:
  contents: write # Important pour laisser GitHub commiter les nouveaux fichiers

jobs:
  autopilot:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Récupération du code source
      uses: actions/checkout@v3

    - name: ⚙️ Configuration de Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'

    - name: 📦 Installation des dépendances
      run: npm ci

    - name: 🤖 Génération du nouveau contenu (Article + Épingle)
      run: node src/scripts/autopilot-content.js

    - name: 💾 Sauvegarde (Commit & Push) vers Vercel
      run: |
        git config --global user.name "Arganor Autopilot"
        git config --global user.email "bot@arganor.com"
        git add src/data/posts.json public/pins/ src/media/
        # S'il y a des changements, on commite et on push (ce qui déclenchera Vercel)
        git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Autopilot: Nouvel Article SEO et Épingle Pinterest générés" && git push)

    - name: 📌 Publication sur Pinterest
      # Attendez que le déploiement Vercel se fasse, puis déclenchez l'API Pinterest
      run: |
        echo "L'article est publié sur le site, Vercel est en cours de build."
        # Si vous vouliez appeler une API Pinterest après :
        # curl -X POST "https://arganor.vercel.app/api/pinterest/publish?batch=5" -H "Authorization: Bearer ${{ secrets.ARGANOR_API_KEY }}"
